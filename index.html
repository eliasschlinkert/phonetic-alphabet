<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Phonetic alphabet</title>
    <link rel="icon" type="image/png" href="anruf.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="input-container">
            <input type="text" id="inputField" placeholder="Enter something..."
                   maxlength="30"
                   autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
            <span id="clearInput" class="clear-icon">🗑️</span>
        </div>
        <p id="limitMsg" class="limit-msg">Maximum 30 characters reached</p>
        <div class="alphabet" id="alphabet">
            <!-- Buchstaben werden hier dynamisch eingefügt -->
        </div>
        <div class="info" id="info">
            <!-- Informationen zum Buchstaben werden hier angezeigt -->
        </div>
    </div>
    <button id="showAlphabet">
        <img src="alphabet-icon.png" alt="Alphabet anzeigen" class="icon">
    </button>
    <div id="alphabetPopup" class="popup">
        <div class="popup-content">
            <span class="close">&times;</span>
            <div class="popup-columns">
                <div>
                    <img src="deutschland.png" alt="Deutsches Telefonalphabet" class="flag">
                    <div id="germanAlphabet" class="popup-alphabet">
                        <!-- Deutsches Alphabet hier -->
                    </div>
                </div>
                <div>
                    <img src="nato.png" alt="NATO Phonetic Alphabet" class="flag">
                    <div id="natoAlphabet" class="popup-alphabet">
                        <!-- NATO Alphabet hier -->
                    </div>
                </div>
            </div>
        </div>
    </div>
	
    <div class="credit">
        <span class="credit-before">made with&nbsp;&nbsp;</span><span class="credit-heart">♥</span><span class="credit-after">&nbsp;&nbsp;by <a href="https://www.eliasslt.de" target="_blank" rel="noopener noreferrer">elias</a></span>
    </div>
    <script src="script.js"></script>
</body>
</html>
